# Labeled retrieval eval set — DuckDB docs (Milestone 1).
#
# Labels point at SOURCE PAGES, not chunk ids. Chunk ids are content-addressed on chunk text,
# so any chunker change would invalidate every label — and M5 re-chunks by design. Page-level
# relevance survives re-chunking, re-embedding, and re-ingestion.
#
# `relevant` is the set of pages that genuinely answer the query. A hit on any of them counts
# for recall. Queries are written the way a user would ask in an issue thread, deliberately
# NOT using the page's own title wording, because a query that quotes the title makes BM25
# look better than it is.
#
# `kind: multi_hop` means answering needs BOTH pages, not either — those are the cases the
# graph index (M1 step 4) exists for, and they are scored separately.

corpus: duckdb-web@89998bfe4a0c docs/current
tenant: duckdb

queries:

  # LABEL CORRECTED 2026-07-21. Originally labeled `create_secret.md` alone, and every config
  # missed it. Inspection showed the retriever was right and the label was wrong:
  # `create_secret.md` is a 2-chunk bare syntax reference, while `configuration/secrets_manager.md`
  # is the page that actually explains where credentials live — and dense ranked it 4th.
  # Widened after reading both pages, not to move the number. The lesson is kept in the M1
  # report: on a docs corpus the answer is routinely split between a reference page and a
  # concept page, so single-page labels systematically understate recall.
